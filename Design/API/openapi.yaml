openapi: 3.2.0
info:
  title: ConnText API
  description: API contracts for the ConnText communication platform
  version: 0.1.0
components:
  securitySchemes:
    bearerHttpAuthentication:
      type: http
      scheme: Bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error identifier
        message:
          type: string
          description: Human-readable error explanation
        details:
          type: string
          description: Stack trace for debugging
  responses:
    Unauthorised:
      description: Request not authorised
      content:
        application/json: 
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Request does not have required permissions
      content:
        application/json: 
          schema: 
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Requested resource does not exist
      content:
        application/json: 
          schema: 
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Request body is invalid or missing required fields
      content:
        application/json: 
          schema: 
            $ref: '#/components/schemas/Error'
          
security: 
  - bearerHttpAuthentication: []
tags:
  - name: Notification (Internal)
  - name: Audit (Internal)
  - name: Auth
  - name: Messaging
  - name: Media
  - name: RTC
  - name: Server Management
  - name: System Management
servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
paths:
  /notification/system:
    post:
      tags: [Notification (Internal)]
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '403':
          $ref: '#/components/responses/Forbidden'
  /notification/email:
