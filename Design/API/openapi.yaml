openapi: 3.2.0
info:
  title: ConnText API
  description: API contracts for the ConnText communication platform
  version: 0.0.1
components:
  securitySchemes:
    bearerHttpAuthentication:
      type: http
      scheme: Bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error identifier
        message:
          type: string
          description: Human-readable error explanation
        details:
          type: string
          description: Stack trace for debugging
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - opaque_payload
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        opaque_payload:
          type: string
          description: Base64-encoded OPAQUE protocol message
    LoginRequest:
      type: object
      required:
        - email
        - opaque_payload
      properties:
        email:
          type: string
          format: email
        opaque_payload:
          type: string
          description: Base64-encoded OPAQUE protocol message
    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        access_token_expires_at:
          type: string
          format: date-time
        refresh_token:
          type: string
        refresh_token_expires_at:
          type: string
          format: date-time
    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    TokenValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
        user_id:
          type: string
    KeyBackupUpload:
      type: object
      required:
        - encrypted_content
      properties:
        encrypted_content:
          type: string
          description: Base64-encoded encrypted key material
    KeyBackupResponse:
      type: object
      properties:
        backup_id:
          type: string
        user_id:
          type: string
        encrypted_content:
          type: string
        updated_at:
          type: string
          format: date-time
    User:
      type: object
      properties:
        user_id:
          type: string
        username:
          type: string
        profile_picture:
          type: string
        user_status:
          type: string
        profile_desc:
          type: string
        last_active:
          type: string
          format: date-time
    UserProfile:
      type: object
      description: Full profile returned to the account owner
      properties:
        user_id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        profile_picture:
          type: string
        user_status:
          type: string
        profile_desc:
          type: string
        two_factor_auth:
          type: boolean
        last_active:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserProfile'
        tokens:
          $ref: '#/components/schemas/TokenPair'
    ServerDetails:
      type: object
      properties:
        server_id:
          type: string
        server_name:
          type: string
        server_picture:
          type: string
        created_at:
          type: string
          format: date-time
        server_desc:
          type: string
        owned_by:
          type: string
    ServerMember:
      type: object
      properties:
        member_id:
          type: string
        user_id:
          type: string
        username:
          type: string
        server_user_nickname:
          type: string
        server_user_profile_picture:
          type: string
        joined_at:
          type: string
          format: date-time
        ban_status:
          type: boolean
        ban_reason:
          type: string
    UpdateMemberRequest:
      type: object
      properties:
        server_user_nickname:
          type: string
        server_user_profile_picture:
          type: string
        ban_status:
          type: boolean
        ban_reason:
          type: string
    Channel:
      type: object
      properties:
        channel_id:
          type: string
        channel_name:
          type: string
        channel_type:
          type: string
          enum: [text, voice, dm]
        created_at:
          type: string
          format: date-time
        channel_desc:
          type: string
        created_by:
          type: string
        encryption_mode:
          type: string
          enum: [e2ee, standard]
    CreateChannelRequest:
      type: object
      required:
        - channel_name
        - channel_type
        - encryption_mode
      properties:
        channel_name:
          type: string
        channel_type:
          type: string
          enum: [text, voice, dm]
        channel_desc:
          type: string
        encryption_mode:
          type: string
          enum: [e2ee, standard]
          description: Immutable once set at creation
    UpdateChannelRequest:
      type: object
      properties:
        channel_name:
          type: string
        channel_desc:
          type: string
    Message:
      type: object
      properties:
        message_id:
          type: string
        member_id:
          type: string
        channel_id:
          type: string
        content:
          type: string
          description: Plaintext for standard channels, ciphertext for E2EE channels
        created_at:
          type: string
          format: date-time
        last_edited_at:
          type: string
          format: date-time
        edit_count:
          type: integer
        reactions:
          type: array
          items:
            $ref: '#/components/schemas/Reaction'
    CreateMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
        media_ids:
          type: array
          items:
            type: string
          description: IDs of previously uploaded media to attach
    UpdateMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
    PaginatedMessages:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        next_cursor:
          type: string
          description: Pass as cursor query param to fetch the next page, null if no more
        has_more:
          type: boolean
    Media:
      type: object
      properties:
        media_id:
          type: string
        message_id:
          type: string
        uploaded_by:
          type: string
        file_location:
          type: string
        file_type:
          type: string
        file_size:
          type: integer
        uploaded_at:
          type: string
          format: date-time
    UpdateMediaRequest:
      type: object
      properties:
        file_type:
          type: string
    Reaction:
      type: object
      properties:
        reaction_id:
          type: string
        message_id:
          type: string
        member_id:
          type: string
        content:
          type: string
          description: Emoji character
    Role:
      type: object
      properties:
        role_id:
          type: string
        role_name:
          type: string
        colour:
          type: string
        role_desc:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    CreateRoleRequest:
      type: object
      required:
        - role_name
      properties:
        role_name:
          type: string
        colour:
          type: string
        role_desc:
          type: string
        permission_ids:
          type: array
          items:
            type: string
    UpdateRoleRequest:
      type: object
      properties:
        role_name:
          type: string
        colour:
          type: string
        role_desc:
          type: string
        permission_ids:
          type: array
          items:
            type: string
    Permission:
      type: object
      properties:
        permission_id:
          type: string
        permission_name:
          type: string
        permission_desc:
          type: string
    CreatePermissionRequest:
      type: object
      required:
        - permission_name
      properties:
        permission_name:
          type: string
        permission_desc:
          type: string
    UpdatePermissionRequest:
      type: object
      properties:
        permission_name:
          type: string
        permission_desc:
          type: string
    CallStatus:
      type: object
      properties:
        channel_id:
          type: string
        active:
          type: boolean
        started_at:
          type: string
          format: date-time
        participant_count:
          type: integer
    JoinCallResponse:
      type: object
      properties:
        channel_id:
          type: string
        sfu_endpoint:
          type: string
          description: WebSocket URL for SFU signalling
    FriendRequest:
      type: object
      properties:
        request_id:
          type: string
        requester_id:
          type: string
        requester_username:
          type: string
        recipient_id:
          type: string
        recipient_username:
          type: string
        status:
          type: string
          enum: [pending, accepted, declined]
        created_at:
          type: string
          format: date-time
    SendFriendRequest:
      type: object
      required:
        - recipient_id
      properties:
        recipient_id:
          type: string
    UpdateFriendRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [accepted, declined]
    Friend:
      type: object
      properties:
        user_id:
          type: string
        username:
          type: string
        profile_picture:
          type: string
        user_status:
          type: string
    Block:
      type: object
      properties:
        block_id:
          type: string
        blocked_id:
          type: string
        blocked_username:
          type: string
        created_at:
          type: string
          format: date-time
    SystemNotificationRequest:
      type: object
      required:
        - recipient_id
        - title
        - body
      properties:
        recipient_id:
          type: string
        title:
          type: string
        body:
          type: string
    EmailNotificationRequest:
      type: object
      required:
        - recipient_email
        - subject
        - body
      properties:
        recipient_email:
          type: string
          format: email
        subject:
          type: string
        body:
          type: string
    AuditLogRequest:
      type: object
      required:
        - service_name
        - event_type
        - severity
        - log_message
      properties:
        actor_id:
          type: string
        service_name:
          type: string
          enum: [Auth, Messaging, Media, RTC, ServerManagement, Social, SystemManagement, Notification]
        event_type:
          type: string
        severity:
          type: string
          enum: [INFO, WARNING, ERROR, CRITICAL]
        log_message:
          type: string
    SuccessResponse:
      type: object
      properties:
        message:
          type: string
  responses:
    Unauthorised:
      description: Request not authorised
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Request does not have required permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Request body is invalid or missing required fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource already exists or conflicts with current state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
security:
  - bearerHttpAuthentication: []
tags:
  - name: Notification (Internal)
  - name: Audit (Internal)
  - name: Auth
  - name: Messaging
  - name: Media
  - name: RTC
  - name: Server Management
  - name: Social
  - name: System Management
    description: Server infrastructure management. Endpoints deferred until Admin Panel design is complete.
servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
paths:
  # -------------------------------- Notification (Internal) --------------------------------
  /notification/system:
    post:
      tags: [Notification (Internal)]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemNotificationRequest'
      responses:
        '200':
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '403':
          $ref: '#/components/responses/Forbidden'
  /notification/email:
    post:
      tags: [Notification (Internal)]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailNotificationRequest'
      responses:
        '202':
          description: Email queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '403':
          $ref: '#/components/responses/Forbidden'
  # -------------------------------- Audit (Internal) --------------------------------
  /audit/log:
    post:
      tags: [Audit (Internal)]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditLogRequest'
      responses:
        '201':
          description: Log entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '403':
          $ref: '#/components/responses/Forbidden'
  # -------------------------------- Auth --------------------------------
  /auth/register:
    post:
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/login:
    post:
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
  /auth/token/refresh:
    post:
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
  /auth/token/validate:
    get:
      tags: [Auth]
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenValidationResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'
  /auth/logout:
    post:
      tags: [Auth]
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'
  /auth/backup:
    put:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyBackupUpload'
      responses:
        '200':
          description: Backup stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
    get:
      tags: [Auth]
      responses:
        '200':
          description: Returns encrypted backup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyBackupResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Auth]
      responses:
        '200':
          description: Backup deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
  # -------------------------------- Messaging --------------------------------
  /messaging/{channelId}:
    parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Messaging]
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Message ID to start after (from previous page's next_cursor)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Number of messages to return
      responses:
        '200':
          description: Paginated message list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMessages'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Messaging]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
  /messaging/{channelId}/{messageId}:
    parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string
      - name: messageId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Messaging]
      responses:
        '200':
          description: Returns the message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Messaging]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMessageRequest'
      responses:
        '200':
          description: Message updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Messaging]
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  # -------------------------------- Media --------------------------------
  /media/{channelId}/{messageId}:
    parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string
      - name: messageId
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Media]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Media uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags: [Media]
      responses:
        '200':
          description: Returns media metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Media'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Media]
      responses:
        '200':
          description: Media deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Media]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMediaRequest'
      responses:
        '200':
          description: Media updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  # -------------------------------- RTC --------------------------------
  /rtc/{channelId}/participants:
    parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [RTC]
      responses:
        '200':
          description: Joined call
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinCallResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [RTC]
      responses:
        '200':
          description: Left call
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
  /rtc/{channelId}/status:
    parameters:
      - name: channelId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [RTC]
      responses:
        '200':
          description: Call status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallStatus'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
  # -------------------------------- Server Management --------------------------------
  /server/users:
    get:
      tags: [Server Management]
      responses:
        '200':
          description: List of server members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServerMember'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Server Management]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
      responses:
        '201':
          description: User added to server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerMember'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '403':
          $ref: '#/components/responses/Forbidden'
  /server/users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Server Management]
      responses:
        '200':
          description: Member details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerMember'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Server Management]
      requestBody:
